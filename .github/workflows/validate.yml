name: Validate projects

on:
  pull_request:
    paths:
      - "data/**"
      - "scripts/**"
  push:
    branches: [main]
    paths:
      - "data/**"
      - "scripts/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate project data
        run: python3 scripts/build_projects.py

  refresh-bundle:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Regenerate project bundle
        run: |
          python3 scripts/build_projects.py
          if git diff --quiet -- data/projects/bundle.js; then
            echo "Project bundle is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/projects/bundle.js
          git commit -m "Regenerate project bundle"
          git push
